<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    background:white;
    width:450px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.balance{
    text-align:center;
    margin-bottom:20px;
}

.balance h2{
    color:green;
}

.summary{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.summary div{
    width:48%;
    padding:15px;
    border-radius:8px;
    text-align:center;
    color:white;
}

.income{
    background:#28a745;
}

.expense{
    background:#dc3545;
}

form{
    display:flex;
    flex-direction:column;
    gap:10px;
}

input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    margin-bottom:10px;
    border-left:5px solid;
    background:#fafafa;
}

.plus{
    border-color:green;
}

.minus{
    border-color:red;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 8px;
    cursor:pointer;
    border-radius:4px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Expense Tracker</h1>

    <div class="balance">
        <h3>Current Balance</h3>
        <h2 id="balance">₹0.00</h2>
    </div>

    <div class="summary">
        <div class="income">
            <h3>Income</h3>
            <p id="income">₹0.00</p>
        </div>

        <div class="expense">
            <h3>Expense</h3>
            <p id="expense">₹0.00</p>
        </div>
    </div>

    <form id="transactionForm">
        <input type="text" id="text" placeholder="Description" required>

        <input
            type="number"
            id="amount"
            placeholder="Amount (positive=income, negative=expense)"
            required
        >

        <button type="submit">Add Transaction</button>
    </form>

    <ul id="transactionList"></ul>
</div>

<script>
const balance = document.getElementById("balance");
const income = document.getElementById("income");
const expense = document.getElementById("expense");
const list = document.getElementById("transactionList");
const form = document.getElementById("transactionForm");

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

function saveTransactions(){
    localStorage.setItem(
        "transactions",
        JSON.stringify(transactions)
    );
}

function updateValues(){
    const amounts = transactions.map(t => t.amount);

    const total = amounts
        .reduce((acc,item)=>acc+item,0)
        .toFixed(2);

    const incomeTotal = amounts
        .filter(item => item > 0)
        .reduce((acc,item)=>acc+item,0)
        .toFixed(2);

    const expenseTotal = (
        amounts
        .filter(item => item < 0)
        .reduce((acc,item)=>acc+item,0) * -1
    ).toFixed(2);

    balance.innerText = `₹${total}`;
    income.innerText = `₹${incomeTotal}`;
    expense.innerText = `₹${expenseTotal}`;
}

function addTransactionDOM(transaction){
    const li = document.createElement("li");

    li.classList.add(
        transaction.amount >= 0 ? "plus" : "minus"
    );

    li.innerHTML = `
        <span>
            ${transaction.text}
            (${transaction.amount >= 0 ? "+" : ""}₹${transaction.amount})
        </span>

        <button
            class="delete-btn"
            onclick="removeTransaction(${transaction.id})"
        >
            X
        </button>
    `;

    list.appendChild(li);
}

function renderTransactions(){
    list.innerHTML = "";

    transactions.forEach(addTransactionDOM);

    updateValues();
}

function removeTransaction(id){
    transactions = transactions.filter(
        transaction => transaction.id !== id
    );

    saveTransactions();
    renderTransactions();
}

form.addEventListener("submit", function(e){
    e.preventDefault();

    const text = document.getElementById("text").value;
    const amount = +document.getElementById("amount").value;

    const transaction = {
        id: Date.now(),
        text,
        amount
    };

    transactions.push(transaction);

    saveTransactions();
    renderTransactions();

    form.reset();
});

renderTransactions();
</script>

</body>
</html>
